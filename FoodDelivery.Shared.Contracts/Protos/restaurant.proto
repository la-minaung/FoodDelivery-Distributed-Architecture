syntax = "proto3";

option csharp_namespace = "FoodDelivery.Shared.Contracts.gRPC";

package restaurant;

service RestaurantMenu {
  rpc CheckMenuAvailability (MenuRequest) returns (MenuResponse);
}

message MenuRequest {
  string item_name = 1;
}

message MenuResponse {
  bool is_available = 1;
  double price = 2;
}