syntax = "proto3";

option csharp_namespace = "FoodDelivery.Shared.Contracts.gRPC";

package restaurant;

service RestaurantMenu {
  rpc CheckMenuAvailability (MenuRequest) returns (MenuResponse);

  rpc SubscribeOrderStatus (OrderStatusRequest) returns (stream OrderStatusResponse);

  rpc SendRiderLocations (stream LocationRequest) returns (LocationSummaryResponse);

  rpc LiveChat (stream ChatMessage) returns (stream ChatMessage);
}

message MenuRequest {
  string item_name = 1;
}

message MenuResponse {
  bool is_available = 1;
  double price = 2;
}


//SubscribeOrderStatus
message OrderStatusRequest {
	string order_id = 1;
}

message OrderStatusResponse {
	string status = 1;
}

//SendRiderLocations
message LocationRequest {
	string rider_id = 1;
	double latitude = 2;
	double longitude = 3;
}

message LocationSummaryResponse {
	string message = 1;
	int32 total_points_received = 2;
}

//LiveChat
message ChatMessage { 
  string sender = 1; 
  string text = 2; 
}